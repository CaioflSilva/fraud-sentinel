spring:
  application:
    name: fraud-sentinel

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:fraud_sentinel}
    username: ${DB_USER:fraud_user}
    password: ${DB_PASSWORD:fraud_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

logging:
  level:
    com.fraudsentinel: DEBUG
    org.hibernate.SQL: DEBUG