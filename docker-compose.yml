services:
  postgres:
    image: postgres:16-alpine
    container_name: fraud-sentinel-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fraud_sentinel}
      POSTGRES_USER: ${POSTGRES_USER:-fraud_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fraud_pass}
    ports:
      - "5433:5432"
    volumes:
      - fraud_sentinel_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fraud_user} -d ${POSTGRES_DB:-fraud_sentinel}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  fraud_sentinel_data: